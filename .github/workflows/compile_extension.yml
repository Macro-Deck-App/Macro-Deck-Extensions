name: Compile Extension

on:
  pull_request_target:
    branches: [ "main" ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: "Setup"
    runs-on: ubuntu-latest
    outputs:
      extension-path: ${{ steps.extract-extension-path.outputs.path }}
    
    steps:  
      - name: Prepare labels
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const add = ['in-process'];
            const remove = [
              'author-actions-required',
              'build-failed',
              'invalid-manifest',
              'moderator-review-required',
              'tests-failed'
            ];

            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: add });
            const current = await github.paginate(github.rest.issues.listLabelsOnIssue, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const currentNames = new Set(current.map((label) => label.name));
            for (const name of remove) {
              if (!currentNames.has(name)) continue;
              await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
            }

      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          ref: "refs/pull/${{ github.event.pull_request.number }}/merge"
        
      - name: Extract extension path
        id: extract-extension-path
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_paths=$(gh pr view ${{ github.event.pull_request.number }} --json files | jq '.files | map(select(.path != ".gitmodules"))')
          files_count=$(jq '. | length' <<< ${pr_paths})
          if [[ $files_count -gt 1 ]]
          then
              echo "Only one extension per pull-request is allowed!"
              exit 1
          elif [[ $files_count -eq 0 ]]
          then
              echo "No extension was found"
              exit 1
          fi
          echo "path=$(jq -r '.[0].path' <<< ${pr_paths})" >> $GITHUB_OUTPUT
        
      - name: Check extension path
        run: echo "${{ steps.extract-extension-path.outputs.path }}"

      - name: Finalize setup labels
        if: always()
        uses: actions/github-script@v7
        env:
          EXTRACT_OUTCOME: ${{ steps.extract-extension-path.outcome }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const failed = process.env.EXTRACT_OUTCOME === 'failure';

            const add = failed ? ['author-actions-required'] : [];
            const remove = failed ? ['in-process'] : [];

            if (add.length > 0) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: add });
            }

            if (remove.length > 0) {
              const current = await github.paginate(github.rest.issues.listLabelsOnIssue, {
                owner,
                repo,
                issue_number,
                per_page: 100
              });
              const currentNames = new Set(current.map((label) => label.name));
              for (const name of remove) {
                if (!currentNames.has(name)) continue;
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              }
            }

      - name: Comment setup errors
        if: always() && steps.extract-extension-path.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;
            const marker = '<!-- compile-extension-report -->';
            const body = [
              marker,
              `@${author}`,
              '',
              'The compile workflow could not determine the extension path.',
              '',
              '**Errors:**',
              '- The PR must change exactly one extension (none or multiple were detected).',
              '',
              `Please check the workflow logs: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const previous = comments.find((c) => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  build:
    name: "Build"
    needs: [ setup ]
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.build_extension.outputs.artifact-name }}
      artifact-path: ${{ steps.build_extension.outputs.artifact-path }}
      manifest: ${{ steps.build_extension.outputs.manifest }}
      validate-status: ${{ steps.validate_extension.outputs.status }}
        
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          ref: "refs/pull/${{ github.event.pull_request.number }}/merge"
        
      - name: Init Submodule
        run: git submodule update --init --recursive ./${{ needs.setup.outputs.extension-path }}

      - name: Validate extension metadata and content
        id: validate_extension
        shell: bash
        continue-on-error: true
        run: |
          chmod +x ./Utils/validate_extension.sh
          set +e
          ./Utils/validate_extension.sh --extension-path "./${{ needs.setup.outputs.extension-path }}" 2>&1 | tee "$RUNNER_TEMP/validate_extension.log"
          status=${PIPESTATUS[0]}
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "log_path=$RUNNER_TEMP/validate_extension.log" >> "$GITHUB_OUTPUT"
          exit 0
        
      - name: Build Extension
        id: build_extension
        if: steps.validate_extension.outputs.status == '0'
        continue-on-error: true
        uses: Macro-Deck-App/Actions/build-extension@main
        with:
          extension-path: ${{ needs.setup.outputs.extension-path }}
          artifact-name: ${{ github.event.pull_request.number }}

      - name: Comment build errors
        if: always()
        uses: actions/github-script@v7
        env:
          VALIDATE_STATUS: ${{ steps.validate_extension.outputs.status }}
          VALIDATE_LOG_PATH: ${{ steps.validate_extension.outputs.log_path }}
          BUILD_OUTCOME: ${{ steps.build_extension.outcome }}
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;
            const marker = '<!-- compile-extension-report -->';
            const validateFailed = process.env.VALIDATE_STATUS !== '0';
            const buildFailed = process.env.BUILD_OUTCOME === 'failure';
            const hasFailure = validateFailed || buildFailed;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const previous = comments.find((c) => c.user?.type === 'Bot' && c.body?.includes(marker));

            if (!hasFailure) {
              if (previous) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: previous.id });
              }
              return;
            }

            let validationLog = '';
            const logPath = process.env.VALIDATE_LOG_PATH;
            if (validateFailed && logPath && fs.existsSync(logPath)) {
              validationLog = fs.readFileSync(logPath, 'utf8').trim();
            }
            if (validationLog.length > 6000) {
              validationLog = validationLog.slice(0, 6000) + '\n... (truncated)';
            }

            const lines = [
              marker,
              `@${author}`,
              '',
              'The compile workflow failed.',
              '',
              '**Error details:**'
            ];

            if (validateFailed) {
              lines.push('- Validation failed (`invalid-manifest`).');
            }
            if (buildFailed) {
              lines.push('- Build failed (`build-failed`).');
            }

            if (validateFailed && validationLog) {
              lines.push('', '**Validation errors (excerpt):**', '```text', validationLog, '```');
            }

            lines.push('', `Workflow-Run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`);
            const body = lines.join('\n');

            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Finalize build labels
        if: always()
        uses: actions/github-script@v7
        env:
          VALIDATE_STATUS: ${{ steps.validate_extension.outputs.status }}
          BUILD_OUTCOME: ${{ steps.build_extension.outcome }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const validationFailed = process.env.VALIDATE_STATUS !== '0';
            const buildFailed = process.env.BUILD_OUTCOME === 'failure';

            let add = [];
            let remove = ['in-process'];

            if (validationFailed) {
              add = ['author-actions-required', 'invalid-manifest'];
              remove.push('build-failed', 'moderator-review-required', 'tests-failed');
            } else if (buildFailed) {
              add = ['author-actions-required', 'build-failed'];
              remove.push('invalid-manifest', 'moderator-review-required', 'tests-failed');
            } else {
              add = ['moderator-review-required'];
              remove.push('author-actions-required', 'build-failed', 'invalid-manifest', 'tests-failed');
            }

            if (add.length > 0) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: add });
            }

            const current = await github.paginate(github.rest.issues.listLabelsOnIssue, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const currentNames = new Set(current.map((label) => label.name));
            for (const name of remove) {
              if (!currentNames.has(name)) continue;
              await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
            }

      - name: Comment review pending
        if: always() && steps.validate_extension.outputs.status == '0' && steps.build_extension.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const marker = '<!-- compile-extension-report -->';

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const previous = comments.find((c) => c.user?.type === 'Bot' && c.body?.includes(marker));

            const body = [
              marker,
              '✅ **Build successful** — all automated checks have passed.',
              '',
              'A moderator will now review this submission. If there are no further questions or remarks, the extension will be published to the Extension Store.',
              '',
              'Thank you for your contribution!'
            ].join('\n');

            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Fail workflow on validation or build errors
        if: always()
        shell: bash
        env:
          VALIDATE_STATUS: ${{ steps.validate_extension.outputs.status }}
          BUILD_OUTCOME: ${{ steps.build_extension.outcome }}
        run: |
          if [[ "${VALIDATE_STATUS}" != "0" || "${BUILD_OUTCOME}" == "failure" ]]; then
            echo "Validation or build failed"
            exit 1
          fi

  deploy:
    name: "Deploy"
    environment: production
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions-ecosystem/action-add-labels@1a9c3715c0037e96b97bb38cb4c4b56a1f1d4871
        with:
          labels: approved

      - uses: actions-ecosystem/action-remove-labels@v1.3.0
        with:
          labels: moderator-review-required

      - name: Download a Build Artifact
        uses: actions/download-artifact@v4.1.9
        with:
          name: ${{ github.event.pull_request.number }}
      
      - name: Upload build files
        id: upload-build-files
        env:
          AUTH_TOKEN: ${{ secrets.MACRO_DECK_API_TOKEN }}
        uses: Macro-Deck-App/Actions/upload-extension@main
        with:
          extension-path: "${{ github.event.pull_request.number }}.zip"
          api-token: ${{ env.AUTH_TOKEN }}
        
      - name: Notify 
        uses: Macro-Deck-App/Actions/notify-extension@main
        with:
          upload-response: ${{ steps.upload-build-files.outputs.response }}
          bot-token: ${{ secrets.BOT_TOKEN }}

      - name: Merge Pull Request
        uses: "pascalgn/automerge-action@v0.16.3"
        env:
          MERGE_LABELS: ""
          PULL_REQUEST: ${{ steps.create-pr.outputs.pull-request-number}}
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
